  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --card: #16161f;
      --border: #2a2a3a;
      --accent: #6c63ff;
      --accent2: #ff6584;
      --accent3: #43e97b;
      --text: #e8e8f0;
      --muted: #b6b6cf;
      --radius: 16px;
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'Hiragino Sans', 'Noto Sans JP', 'Segoe UI', system-ui, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── KEYFRAMES ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes floatOrb1 {
      0%,100% { transform: translate(0,0) scale(1); }
      33%      { transform: translate(40px,-30px) scale(1.08); }
      66%      { transform: translate(-20px,20px) scale(.95); }
    }
    @keyframes floatOrb2 {
      0%,100% { transform: translate(0,0) scale(1); }
      40%      { transform: translate(-30px,40px) scale(1.1); }
      70%      { transform: translate(20px,-15px) scale(.92); }
    }
    @keyframes floatOrb3 {
      0%,100% { transform: translate(0,0); }
      50%      { transform: translate(25px,30px); }
    }
    @keyframes gradientShift {
      0%,100% { background-position: 0% 50%; }
      50%      { background-position: 100% 50%; }
    }
    @keyframes badgePulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(108,99,255,0); }
      50%      { box-shadow: 0 0 0 6px rgba(108,99,255,.08); }
    }
    @keyframes navSlideDown {
      from { opacity: 0; transform: translateY(-100%); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes avatarGlow {
      0%,100% { box-shadow: 0 0 0 0 rgba(108,99,255,.3); }
      50%      { box-shadow: 0 0 32px 8px rgba(108,99,255,.15); }
    }
    @keyframes progressGrow {
      from { width: 0; }
    }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 48px;
      background: rgba(10,10,15,.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      animation: navSlideDown .6s ease both;
    }
    nav .logo {
      font-size: 20px; font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    nav .nav-right { display: flex; align-items: center; gap: 20px; }
    nav ul { list-style: none; display: flex; gap: 24px; }
    nav a { color: var(--muted); text-decoration: none; font-size: 14px; font-weight: 500; transition: color .2s; }
    nav a:hover { color: var(--text); }
    .nav-divider { width: 1px; height: 18px; background: var(--border); flex-shrink: 0; }

    /* scroll progress */
    #progress {
      position: fixed; top: 0; left: 0; height: 2px; z-index: 200;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      width: 0; transition: width .1s linear;
    }

    /* ── LANG SWITCH ── */
    .lang-switch {
      display: flex; align-items: center;
      background: var(--card); border: 1px solid var(--border); border-radius: 100px; padding: 3px; gap: 2px;
    }
    .lang-btn {
      border: none; background: transparent; color: var(--muted);
      font-size: 12px; font-weight: 700; padding: 5px 14px; border-radius: 100px;
      cursor: pointer; transition: all .25s; font-family: inherit; letter-spacing: .5px;
    }
    .lang-btn:not(.active):hover { color: var(--text); }
    .lang-btn.active {
      background: var(--accent); color: #fff;
      box-shadow: 0 0 14px rgba(108,99,255,.45);
    }

    /* ── HERO ── */
    .hero {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 120px 24px 80px;
      position: relative; overflow: hidden;
    }
    .orb { position: absolute; border-radius: 50%; filter: blur(90px); pointer-events: none; will-change: transform; }
    .orb-1 { width: 520px; height: 520px; background: radial-gradient(circle, rgba(108,99,255,.22), transparent 70%); top: 10%; left: 15%; animation: floatOrb1 12s ease-in-out infinite; }
    .orb-2 { width: 360px; height: 360px; background: radial-gradient(circle, rgba(255,101,132,.16), transparent 70%); bottom: 10%; right: 10%; animation: floatOrb2 15s ease-in-out infinite; }
    .orb-3 { width: 220px; height: 220px; background: radial-gradient(circle, rgba(67,233,123,.12), transparent 70%); top: 40%; right: 25%; animation: floatOrb3 9s ease-in-out infinite; }

    .hero-badge {
      display: inline-block; padding: 6px 18px; border-radius: 100px;
      border: 1px solid var(--border); font-size: 13px; color: var(--muted); margin-bottom: 24px;
      opacity: 0; animation: fadeUp .7s .3s ease both, badgePulse 3s 1.5s ease-in-out infinite;
    }
    .hero h1 {
      font-size: clamp(36px,6vw,72px); font-weight: 800; letter-spacing: -1px; line-height: 1.15; margin-bottom: 20px;
      opacity: 0; animation: fadeUp .8s .5s ease both;
    }
    .hero h1 span {
      background: linear-gradient(135deg, var(--accent), var(--accent2), var(--accent));
      background-size: 200% 200%;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      animation: gradientShift 4s 1.5s ease-in-out infinite;
    }
    .hero p { font-size: 17px; color: var(--muted); max-width: 520px; margin-bottom: 40px; opacity: 0; animation: fadeUp .8s .7s ease both; }
    .hero-stats { display: flex; gap: 48px; justify-content: center; flex-wrap: wrap; opacity: 0; animation: fadeUp .8s .9s ease both; }
    .stat { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .stat-num {
      font-size: 36px; font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent3));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .stat-label { font-size: 13px; color: var(--muted); }

    /* ── SCROLL REVEAL ── */
    .reveal { opacity: 0; transform: translateY(28px); transition: opacity .55s ease, transform .55s ease; transition-delay: var(--delay,0s); }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    /* ── SECTION COMMON ── */
    section { max-width: 1200px; margin: 0 auto; padding: 100px 24px; }
    .section-header { margin-bottom: 60px; }
    .section-tag { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); margin-bottom: 12px; }
    .section-title { font-size: clamp(28px,4vw,44px); font-weight: 800; letter-spacing: -.5px; margin-bottom: 12px; }
    .section-desc { font-size: 16px; color: var(--muted); max-width: 520px; }

    /* ── ABOUT ── */
    .about-grid {
      display: grid; grid-template-columns: 1fr 1.6fr; gap: 64px; align-items: center;
    }
    .about-left { display: flex; flex-direction: column; align-items: center; gap: 20px; }
    .avatar {
      width: 140px; height: 140px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 44px; font-weight: 900; color: #fff; letter-spacing: -2px;
      animation: avatarGlow 3s ease-in-out infinite;
      flex-shrink: 0;
    }
    .about-name { font-size: 24px; font-weight: 800; }
    .about-role { font-size: 14px; color: var(--accent); font-weight: 600; }
    .about-location { font-size: 13px; color: var(--muted); }
    .about-right {}
    .about-bio { font-size: 16px; color: var(--muted); line-height: 1.9; margin-bottom: 28px; }
    .about-highlights { display: flex; flex-direction: column; gap: 12px; }
    .highlight {
      display: flex; align-items: flex-start; gap: 12px;
      background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 18px;
    }
    .highlight-icon { font-size: 18px; flex-shrink: 0; margin-top: 2px; }
    .highlight-text { font-size: 14px; color: var(--muted); line-height: 1.6; }
    .highlight-text strong { color: var(--text); font-weight: 600; }

    @media (max-width: 768px) {
      .about-grid { grid-template-columns: 1fr; gap: 40px; }
      .about-left { flex-direction: row; align-items: center; gap: 24px; }
      .avatar { width: 80px; height: 80px; font-size: 26px; }
      .about-name { font-size: 20px; }
    }

    /* ── GRID ── */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px,1fr)); gap: 20px; }
    .grid-3 { grid-template-columns: repeat(auto-fill, minmax(260px,1fr)); }

    /* ── CARD ── */
    .card {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 28px; position: relative; overflow: hidden; cursor: default;
      transition: border-color .3s, transform .3s, box-shadow .3s;
    }
    .card::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, transparent 50%, rgba(108,99,255,.07)); opacity: 0; transition: opacity .3s; }
    .card::after { content: ''; position: absolute; top: 0; left: -100%; width: 60%; height: 100%; background: linear-gradient(90deg,transparent,rgba(255,255,255,.04),transparent); transition: left .5s ease; }
    .card:hover { border-color: var(--accent); transform: translateY(-6px); box-shadow: 0 20px 60px rgba(108,99,255,.12); }
    .card:hover::before { opacity: 1; }
    .card:hover::after { left: 140%; }
    .card-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; margin-bottom: 16px; transition: transform .3s; }
    .card:hover .card-icon { transform: scale(1.12) rotate(-4deg); }
    .card-num { position: absolute; top: 20px; right: 24px; font-size: 40px; font-weight: 900; color: rgba(255,255,255,.04); line-height: 1; }
    .card-title { font-size: 17px; font-weight: 700; margin-bottom: 8px; }
    .card-desc  { font-size: 14px; color: var(--muted); line-height: 1.75; }
    .card-tags  { margin-top: 16px; display: flex; flex-wrap: wrap; gap: 6px; }

    /* ── TAG ── */
    .tag { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 100px; background: rgba(108,99,255,.15); color: var(--accent); border: 1px solid rgba(108,99,255,.25); transition: background .2s, transform .2s; }
    .tag:hover { background: rgba(108,99,255,.28); transform: scale(1.05); }
    .tag.green { background: rgba(67,233,123,.1);  color: var(--accent3); border-color: rgba(67,233,123,.2); }
    .tag.green:hover { background: rgba(67,233,123,.22); }
    .tag.pink  { background: rgba(255,101,132,.1); color: var(--accent2); border-color: rgba(255,101,132,.2); }
    .tag.pink:hover  { background: rgba(255,101,132,.22); }

    .icon-purple { background: rgba(108,99,255,.15); }
    .icon-pink   { background: rgba(255,101,132,.15); }
    .icon-green  { background: rgba(67,233,123,.12); }
    .icon-orange { background: rgba(255,165,0,.12); }
    .icon-blue   { background: rgba(56,189,248,.12); }
    .icon-cyan   { background: rgba(34,211,238,.12); }
    .icon-red    { background: rgba(248,113,113,.12); }
    .icon-yellow { background: rgba(250,204,21,.12); }
    .icon-teal   { background: rgba(45,212,191,.12); }

    /* ── SHOW MORE ── */
    .show-more-wrap { display: none; justify-content: center; margin-top: 28px; }
    .show-more-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 28px; border-radius: 100px;
      background: var(--card); border: 1px solid var(--border);
      color: var(--text); font-size: 14px; font-weight: 700;
      cursor: pointer; font-family: inherit;
      transition: border-color .2s, transform .2s;
    }
    .show-more-btn:hover { border-color: var(--accent); transform: translateY(-2px); }
    .show-more-btn svg { width: 16px; height: 16px; transition: transform .3s; }
    .show-more-btn.expanded svg { transform: rotate(180deg); }

    @media (max-width: 640px) {
      #systemsGrid .card:nth-child(n+5) { display: none; }
      #systemsGrid.expanded .card:nth-child(n+5) { display: block; }
      .show-more-wrap { display: flex; }
    }

    /* ── TECH STACK ── */
    .stack-groups { display: flex; flex-direction: column; gap: 28px; }
    .stack-group {}
    .stack-group-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 10px; }
    .stack-pills { display: flex; flex-wrap: wrap; gap: 8px; }
    .pill {
      display: flex; align-items: center; gap: 7px;
      padding: 7px 14px; border-radius: 100px;
      background: var(--card); border: 1px solid var(--border);
      font-size: 13px; font-weight: 600; color: var(--text);
      transition: border-color .2s, transform .2s, box-shadow .2s;
      cursor: default;
    }
    .pill:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(108,99,255,.1); }
    .pill .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .dot-blue   { background: #60a5fa; }
    .dot-green  { background: #4ade80; }
    .dot-yellow { background: #facc15; }
    .dot-orange { background: #fb923c; }
    .dot-purple { background: #a78bfa; }
    .dot-pink   { background: #f472b6; }
    .dot-cyan   { background: #22d3ee; }
    .dot-red    { background: #f87171; }
    .dot-teal   { background: #2dd4bf; }

    /* ── FAQ ── */
    .faq-list { display: flex; flex-direction: column; gap: 12px; }
    .faq-item { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; transition: border-color .25s; }
    .faq-item.open { border-color: var(--accent); }
    .faq-q {
      width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 16px;
      padding: 20px 24px; background: transparent; border: none; cursor: pointer; text-align: left;
      font-family: inherit; font-size: 15px; font-weight: 700; color: var(--text);
    }
    .faq-q-icon { flex-shrink: 0; width: 22px; height: 22px; color: var(--accent); transition: transform .3s; }
    .faq-item.open .faq-q-icon { transform: rotate(45deg); }
    .faq-a-wrap { max-height: 0; overflow: hidden; transition: max-height .3s ease; }
    .faq-a { padding: 0 24px 20px; font-size: 14px; color: var(--muted); line-height: 1.8; }

    /* ── CONTACT ── */
    .contact-wrap {
      display: flex; flex-direction: column; align-items: center;
      text-align: center; gap: 20px;
    }
    .contact-title { font-size: clamp(28px,4vw,48px); font-weight: 800; letter-spacing: -.5px; }
    .contact-title span {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .contact-desc { font-size: 16px; color: var(--muted); max-width: 420px; }
    .contact-btn {
      display: inline-flex; align-items: center; gap: 10px;
      margin-top: 8px; padding: 14px 32px; border-radius: 100px;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      color: #fff; font-size: 15px; font-weight: 700;
      text-decoration: none; border: none; cursor: pointer; font-family: inherit;
      transition: transform .25s, box-shadow .25s, opacity .25s;
      box-shadow: 0 8px 32px rgba(108,99,255,.3);
    }
    .contact-btn:hover { transform: translateY(-3px); box-shadow: 0 16px 48px rgba(108,99,255,.45); }
    .contact-btn:active { transform: translateY(0); }

let currentLang = 'ja';

function applyLang(lang) {
  const dict = i18n[lang];
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = dict[el.dataset.i18n];
    if (v != null) el.innerHTML = v.replace(/\n/g, '<br>');
  });
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === lang);
  });
  updateSysMoreLabel();
}

/* ── SYSTEMS SHOW MORE ── */
function updateSysMoreLabel() {
  const grid = document.getElementById('systemsGrid');
  const label = document.getElementById('systemsMoreLabel');
  if (!grid || !label) return;
  const expanded = grid.classList.contains('expanded');
  label.textContent = i18n[currentLang][expanded ? 'sys_less' : 'sys_more'];
}
document.getElementById('systemsMoreBtn').addEventListener('click', () => {
  const grid = document.getElementById('systemsGrid');
  const btn = document.getElementById('systemsMoreBtn');
  grid.classList.toggle('expanded');
  btn.classList.toggle('expanded');
  updateSysMoreLabel();
});

function setLang(lang) {
  if (lang === currentLang) return;
  currentLang = lang;
  document.body.classList.add('switching');
  setTimeout(() => { applyLang(lang); document.body.classList.remove('switching'); }, 150);
}

applyLang('ja');

/* ── COUNT-UP ── */
function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
function countUp(el, target, duration) {
  let start = null;
  function step(ts) {
    if (!start) start = ts;
    const p = Math.min((ts - start) / duration, 1);
    el.textContent = Math.round(easeOutCubic(p) * target);
    if (p < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}
setTimeout(() => {
  document.querySelectorAll('.stat-num[data-count]').forEach(el => {
    countUp(el, parseInt(el.dataset.count), 1400);
  });
}, 1000);

/* ── SCROLL REVEAL ── */
const revealObs = new IntersectionObserver((entries) => {
  entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); revealObs.unobserve(e.target); } });
}, { threshold: 0.1, rootMargin: '0px 0px -32px 0px' });

document.querySelectorAll('.grid').forEach(grid => {
  grid.querySelectorAll('.reveal').forEach((card, i) => {
    card.style.setProperty('--delay', `${i * 0.07}s`);
  });
});
document.querySelectorAll('.reveal').forEach(el => revealObs.observe(el));

/* ── FAQ ACCORDION ── */
document.querySelectorAll('.faq-item').forEach(item => {
  const btn = item.querySelector('.faq-q');
  const wrap = item.querySelector('.faq-a-wrap');
  btn.addEventListener('click', () => {
    const isOpen = item.classList.contains('open');
    document.querySelectorAll('.faq-item.open').forEach(other => {
      if (other !== item) {
        other.classList.remove('open');
        other.querySelector('.faq-a-wrap').style.maxHeight = null;
      }
    });
    if (isOpen) {
      item.classList.remove('open');
      wrap.style.maxHeight = null;
    } else {
      item.classList.add('open');
      wrap.style.maxHeight = wrap.scrollHeight + 'px';
    }
  });
});

/* ── SCROLL PROGRESS BAR ── */
const bar = document.getElementById('progress');
window.addEventListener('scroll', () => {
  const total = document.documentElement.scrollHeight - window.innerHeight;
  bar.style.width = (window.scrollY / total * 100) + '%';
}, { passive: true });
